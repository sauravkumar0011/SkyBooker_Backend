server:
  port: ${PASSENGER_SERVICE_PORT:8085}

spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: passenger-service

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${PASSENGER_DB_NAME:skybooker_passenger_db}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    hikari:
      pool-name: passenger-service-pool
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1

jwt:
  secret: ${JWT_SECRET}